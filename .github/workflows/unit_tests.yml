name: Django Unit Tests and Integration Tests

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t djangosige .

      - name: Run Django tests (Models, Forms, Views, and Integration)
        run: |
          docker run --rm \
            -e SECRET_KEY=test-secret-key \
            -e ALLOWED_HOSTS=localhost \
            djangosige \
            python manage.py test \
            djangosige.tests.compras.test_models \
            djangosige.tests.compras.test_forms \
            djangosige.tests.compras.test_views \
            djangosige.tests.estoque.test_models \
            djangosige.tests.estoque.test_forms \
            djangosige.tests.estoque.test_views \
            djangosige.tests.vendas.test_models \
            djangosige.tests.vendas.test_forms \
            djangosige.tests.vendas.test_views \
            djangosige.tests.test_integration